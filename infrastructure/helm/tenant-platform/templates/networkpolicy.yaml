{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "%s-default" (include "tenant-platform.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "tenant-platform.namespace" . }}
  labels:
    {{- include "tenant-platform.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - podSelector: {}
    {{- end }}
    {{- if .Values.networkPolicy.ingressControllerNamespaces }}
    - from:
        {{- range .Values.networkPolicy.ingressControllerNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowDnsEgress }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: "kube-system"
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    - to:
        - podSelector: {}
    {{- range .Values.networkPolicy.extraEgressCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
    {{- end }}
{{- end }}
