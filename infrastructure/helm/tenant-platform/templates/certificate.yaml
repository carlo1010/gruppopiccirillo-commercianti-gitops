{{- if .Values.certificate.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "tenant-platform.fullname" . }}
  namespace: {{ include "tenant-platform.namespace" . }}
  labels:
    {{- include "tenant-platform.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.tenant.tls.secretName | quote }}
  duration: {{ .Values.certificate.duration | quote }}
  renewBefore: {{ .Values.certificate.renewBefore | quote }}
  issuerRef:
    name: {{ .Values.tenant.tls.issuerRef | quote }}
    kind: ClusterIssuer
  privateKey:
    algorithm: {{ .Values.certificate.privateKey.algorithm | quote }}
    size: {{ .Values.certificate.privateKey.size }}
  dnsNames:
    {{- range .Values.tenant.domains }}
    - {{ . | quote }}
    {{- end }}
    {{- if and .Values.ingress.cms.enabled .Values.ingress.cms.host }}
    - {{ .Values.ingress.cms.host | quote }}
    {{- end }}
{{- end }}
