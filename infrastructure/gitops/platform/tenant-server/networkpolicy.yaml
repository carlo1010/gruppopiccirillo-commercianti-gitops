apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-server-default
  namespace: platform
  labels:
    app.kubernetes.io/part-of: tenant-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tenant-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
